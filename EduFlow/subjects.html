<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduFlow - Mata Kuliah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#4f46e5" />
<link rel="stylesheet" href="assets/css/main.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/subjects.css" />
<link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-page="subjects">
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-foot">EduFlow &copy; 2026</div>
  </aside>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-avatar">E</div>
        <span class="brand-name">EduFlow</span>
      </div>
      <button class="icon-btn" aria-label="Notifikasi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
    </div>
    <div class="container">
      <p class="eyebrow">AKADEMIK</p>
      <h1 class="page-title">Mata Kuliah</h1>

      <div class="section-head" style="margin-top:0;">
        <h2 style="font-size:18px;">Tahun Akademik</h2>
        <span class="badge-count" style="background:var(--secondary-container);color:var(--secondary);">Aktif</span>
      </div>
      <div class="semester-tabs" id="semesterTabs"></div>

      <div class="card progress-card">
        <div class="stat-label">TOTAL PROGRES</div>
        <div class="big-pct" id="totalProgressPct">0% Selesai</div>
        <div class="progress-track"><div class="progress-fill" id="totalProgressFill" style="width:0%"></div></div>
      </div>

      <div class="credit-banner">
        <div class="eyebrow">TOTAL SKS</div>
        <div class="big-pct" id="totalSks">0 SKS</div>
      </div>

      <div class="section-head" style="margin-top:0;">
        <h2>Mata Kuliahku</h2>
      </div>
      <div class="subject-grid" id="subjectGrid"></div>
    </div>

    <button class="fab" id="fabBtn" aria-label="Tambah mata kuliah">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <nav class="bottom-nav"></nav>
  </div>
</div>

<div class="modal-backdrop" id="subjectModalBackdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <h3 id="subjectModalTitle">Tambah Mata Kuliah</h3>
    <input type="hidden" id="subjectId" />
    <div class="field">
      <label>Nama Mata Kuliah</label>
      <input type="text" id="sName" placeholder="cth: Algoritma Lanjut" />
    </div>
    <div class="field">
      <label>Kode</label>
      <input type="text" id="sCode" placeholder="cth: CS-302" />
    </div>
    <div class="field">
      <label>Dosen</label>
      <input type="text" id="sLecturer" placeholder="cth: Prof. Aristhos" />
    </div>
    <div class="field">
      <label>Email Dosen</label>
      <input type="email" id="sLecturerEmail" placeholder="dosen@univ.ac.id" />
    </div>
    <div class="field">
      <label>Nomor Dosen</label>
      <input type="text" id="sLecturerPhone" placeholder="0812xxxx" />
    </div>
    <div class="field">
      <label>SKS</label>
      <input type="number" id="sSks" min="1" max="6" value="3" />
    </div>
    <div class="field">
      <label>Semester</label>
      <input type="number" id="sSemester" min="1" max="14" value="5" />
    </div>
    <div class="field">
      <label>Ruangan</label>
      <input type="text" id="sRoom" placeholder="cth: Lab A" />
    </div>
    <div class="field">
      <label>Hari</label>
      <select id="sDay">
        <option value="">Pilih hari</option>
        <option value="Senin">Senin</option>
        <option value="Selasa">Selasa</option>
        <option value="Rabu">Rabu</option>
        <option value="Kamis">Kamis</option>
        <option value="Jumat">Jumat</option>
        <option value="Sabtu">Sabtu</option>
      </select>
    </div>
    <div class="field">
      <label>Jam Mulai - Selesai</label>
      <div style="display:flex;gap:0.5rem;">
        <input type="time" id="sStartTime" style="flex:1;" />
        <input type="time" id="sEndTime" style="flex:1;" />
      </div>
    </div>
    <div class="field">
      <label>Link LMS</label>
      <input type="url" id="sLinkLms" placeholder="https://lms.univ.ac.id/" />
    </div>
    <div class="field">
      <label>Link Google Meet</label>
      <input type="url" id="sLinkMeet" placeholder="https://meet.google.com/" />
    </div>
    <div class="field">
      <label>Link WhatsApp</label>
      <input type="text" id="sLinkWa" placeholder="https://wa.me/..." />
    </div>
    <div class="field">
      <label>Catatan</label>
      <textarea id="sNotes" placeholder="Catatan tambahan..."></textarea>
    </div>
    <div class="field">
      <label>Warna Aksen</label>
      <select id="sColor">
        <option value="#4f46e5">Indigo</option>
        <option value="#006c49">Hijau</option>
        <option value="#a44100">Oranye</option>
        <option value="#ba1a1a">Merah</option>
        <option value="#0e7490">Teal</option>
        <option value="#7c3aed">Ungu</option>
        <option value="#0284c7">Biru</option>
        <option value="#be185d">Pink</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('subjectModalBackdrop').classList.remove('open')">Batal</button>
      <button class="btn btn-primary" id="subjectSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script src="assets/js/app.js" type="module"></script>
</body>
</html>
